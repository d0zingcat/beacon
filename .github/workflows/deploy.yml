name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Enable pnpm
        run: corepack enable && corepack prepare pnpm@11.9.0 --activate

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm run typecheck
      - run: pnpm test --run

  deploy:
    needs: test
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v6

      - name: Enable pnpm
        run: corepack enable && corepack prepare pnpm@11.9.0 --activate

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate deploy config from D1_DATABASE_ID
        env:
          D1_DATABASE_ID: ${{ secrets.D1_DATABASE_ID }}
        run: node scripts/generate-deploy-config.mjs

      - name: Apply D1 migrations
        run: pnpm exec wrangler d1 migrations apply beacon-db --remote --config .wrangler/deploy/wrangler.jsonc

      - name: Deploy Worker
        run: pnpm exec wrangler deploy --config .wrangler/deploy/wrangler.jsonc
